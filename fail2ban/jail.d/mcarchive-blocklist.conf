# Applies the MCArchive scanner blocklist via fail2ban
#
# IPs are fed in by update.sh, the jail simply
# holds the bans and applies the action. bantime is 24h to match the list's
# refresh cadence, so an address that is pruned from the list (i.e. has stopped
# scanning) drops out of the ban set automatically once its ban expires.
[mcarchive-blocklist]
enabled = true
filter = mcarchive-blocklist
backend = polling
logpath = /var/log/mcarchive-blocklist/feed.log
bantime = 86400
findtime = 86400
maxretry = 1
# Drop on all ports. To restrict to your Minecraft port instead, replace the
# line below with:
# action = iptables-multiport[name=mcarchive-blocklist, port="25565", protocol=tcp]
action = iptables-allports[name=mcarchive-blocklist]
